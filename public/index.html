<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luna Trends — Travelgenix</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231B2B5B'/><path d='M6 22l6-7 4 4 6-9' fill='none' stroke='%2300B4D8' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/></svg>">
<style>
  :root {
    --tg-primary: #1B2B5B; --tg-primary-light: #2A3F7A; --tg-primary-dark: #111D3E;
    --tg-accent: #00B4D8; --tg-accent-light: #48CAE4; --tg-accent-dark: #0096B7;
    --tg-success: #10B981; --tg-warning: #F59E0B; --tg-error: #EF4444; --tg-info: #3B82F6;
    --tg-bg-primary: #FFFFFF; --tg-bg-secondary: #F8FAFC; --tg-bg-tertiary: #F1F5F9;
    --tg-border: #E2E8F0; --tg-border-light: #F1F5F9;
    --tg-text-primary: #0F172A; --tg-text-secondary: #475569; --tg-text-tertiary: #94A3B8;
    --tg-text-inverse: #FFFFFF;
    --radius-sm: 6px; --radius-md: 8px; --radius-lg: 12px; --radius-xl: 16px; --radius-2xl: 20px; --radius-full: 9999px;
    --shadow-xs: 0 1px 2px rgba(0,0,0,.05);
    --shadow-sm: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
    --shadow-md: 0 4px 6px rgba(0,0,0,.06), 0 2px 4px rgba(0,0,0,.04);
    --shadow-lg: 0 10px 15px rgba(0,0,0,.08), 0 4px 6px rgba(0,0,0,.04);
    --shadow-xl: 0 20px 25px rgba(0,0,0,.08), 0 10px 10px rgba(0,0,0,.04);
    --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
  }
  [data-theme="dark"] {
    --tg-bg-primary: #0F172A; --tg-bg-secondary: #1E293B; --tg-bg-tertiary: #334155;
    --tg-border: #334155; --tg-border-light: #1E293B;
    --tg-text-primary: #F8FAFC; --tg-text-secondary: #CBD5E1; --tg-text-tertiary: #64748B;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: var(--font); background: var(--tg-bg-secondary); color: var(--tg-text-primary);
    font-size: 15px; line-height: 1.6; -webkit-font-smoothing: antialiased;
    transition: background .3s ease, color .3s ease;
  }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }

  /* ---------- Top bar ---------- */
  .topbar {
    position: sticky; top: 0; z-index: 10; display: flex; align-items: center; gap: 16px;
    padding: 16px 24px; background: var(--tg-primary); color: var(--tg-text-inverse);
    box-shadow: var(--shadow-md);
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-logo {
    width: 40px; height: 40px; border-radius: var(--radius-md); background: rgba(255,255,255,.08);
    display: grid; place-items: center; flex-shrink: 0;
  }
  .brand-text h1 { font-size: 18px; font-weight: 700; letter-spacing: -.01em; line-height: 1.2; }
  .brand-text p { font-size: 11px; color: var(--tg-accent-light); font-weight: 500; letter-spacing: .04em; text-transform: uppercase; }
  .topbar-spacer { flex: 1; }
  .icon-btn {
    width: 40px; height: 40px; border-radius: var(--radius-md); border: none; cursor: pointer;
    background: rgba(255,255,255,.08); color: var(--tg-text-inverse); display: grid; place-items: center;
    transition: background .15s ease;
  }
  .icon-btn:hover { background: rgba(255,255,255,.16); }
  .icon-btn:focus-visible { outline: 3px solid var(--tg-accent); outline-offset: 2px; }

  /* ---------- Layout ---------- */
  .wrap { max-width: 1440px; margin: 0 auto; padding: 24px; }
  .updated { font-size: 13px; color: var(--tg-text-tertiary); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

  /* ---------- Stat cards ---------- */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .stat {
    background: var(--tg-bg-primary); border: 1px solid var(--tg-border); border-radius: var(--radius-lg);
    padding: 20px; box-shadow: var(--shadow-sm);
  }
  .stat .label { font-size: 13px; color: var(--tg-text-secondary); font-weight: 500; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .stat .value { font-size: 28px; font-weight: 700; letter-spacing: -.02em; font-variant-numeric: tabular-nums; }
  .stat .sub { font-size: 13px; color: var(--tg-text-tertiary); margin-top: 2px; }
  .stat.accent .value { color: var(--tg-accent-dark); }

  /* ---------- Tabs ---------- */
  .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--tg-border); margin-bottom: 24px; overflow-x: auto; }
  .tab {
    padding: 12px 16px; border: none; background: none; cursor: pointer; font-family: var(--font);
    font-size: 15px; font-weight: 500; color: var(--tg-text-secondary); border-bottom: 2px solid transparent;
    white-space: nowrap; display: flex; align-items: center; gap: 8px; transition: color .15s ease;
  }
  .tab:hover { color: var(--tg-text-primary); }
  .tab[aria-selected="true"] { color: var(--tg-accent-dark); border-bottom-color: var(--tg-accent); }
  .tab:focus-visible { outline: 3px solid var(--tg-accent); outline-offset: -3px; border-radius: var(--radius-sm); }
  .tab .count { font-size: 12px; background: var(--tg-bg-tertiary); color: var(--tg-text-secondary); padding: 1px 8px; border-radius: var(--radius-full); font-variant-numeric: tabular-nums; }

  /* ---------- Section header + actions ---------- */
  .section-head { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
  .section-head h2 { font-size: 22px; font-weight: 600; letter-spacing: -.01em; }
  .actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn {
    display: inline-flex; align-items: center; gap: 8px; padding: 0 16px; height: 40px; border-radius: var(--radius-md);
    font-family: var(--font); font-size: 14px; font-weight: 600; cursor: pointer; border: 1px solid transparent;
    transition: background .15s ease, transform .1s ease; white-space: nowrap;
  }
  .btn:active { transform: scale(.98); }
  .btn:focus-visible { outline: 3px solid var(--tg-accent); outline-offset: 2px; }
  .btn-primary { background: var(--tg-accent); color: #fff; }
  .btn-primary:hover { background: var(--tg-accent-dark); }
  .btn-secondary { background: var(--tg-bg-primary); color: var(--tg-text-primary); border-color: var(--tg-border); }
  .btn-secondary:hover { background: var(--tg-bg-tertiary); }
  .btn:disabled { opacity: .55; cursor: not-allowed; }

  /* ---------- Trend cards ---------- */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }
  .card {
    background: var(--tg-bg-primary); border: 1px solid var(--tg-border); border-radius: var(--radius-xl);
    padding: 24px; box-shadow: var(--shadow-sm); transition: box-shadow .2s ease, transform .2s ease;
    display: flex; flex-direction: column;
  }
  .card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
  .card h3 { font-size: 18px; font-weight: 600; letter-spacing: -.01em; line-height: 1.3; }
  .score { font-size: 28px; font-weight: 700; letter-spacing: -.02em; font-variant-numeric: tabular-nums; line-height: 1; flex-shrink: 0; }
  .score.high { color: var(--tg-success); } .score.mid { color: var(--tg-warning); } .score.low { color: var(--tg-text-tertiary); }
  .card .desc { font-size: 14px; color: var(--tg-text-secondary); margin-bottom: 16px; flex: 1; }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .chip {
    font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: var(--radius-full);
    background: var(--tg-bg-tertiary); color: var(--tg-text-secondary); display: inline-flex; align-items: center; gap: 4px;
  }
  .chip.dir-rising { background: rgba(16,185,129,.12); color: var(--tg-success); }
  .chip.dir-stable { background: rgba(245,158,11,.12); color: var(--tg-warning); }
  .chip.dir-falling { background: rgba(239,68,68,.12); color: var(--tg-error); }
  .chip.type { background: rgba(0,180,216,.12); color: var(--tg-accent-dark); }
  .ma { border-top: 1px solid var(--tg-border-light); padding-top: 16px; margin-top: auto; }
  .ma-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--tg-text-tertiary); margin-bottom: 10px; }
  .ma-item { padding: 10px 12px; background: var(--tg-bg-secondary); border-radius: var(--radius-md); margin-bottom: 8px; }
  .ma-item:last-child { margin-bottom: 0; }
  .ma-item .ma-type { font-size: 11px; font-weight: 700; color: var(--tg-accent-dark); text-transform: uppercase; letter-spacing: .03em; }
  .ma-item .ma-headline { font-size: 14px; font-weight: 600; margin: 2px 0; }
  .ma-item .ma-brief { font-size: 13px; color: var(--tg-text-secondary); }

  /* ---------- Signals + sources tables ---------- */
  .list { background: var(--tg-bg-primary); border: 1px solid var(--tg-border); border-radius: var(--radius-lg); overflow: hidden; }
  .row { display: flex; align-items: center; gap: 16px; padding: 14px 20px; border-bottom: 1px solid var(--tg-border-light); }
  .row:last-child { border-bottom: none; }
  .row .main { flex: 1; min-width: 0; }
  .row .title { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
  .row .meta { font-size: 13px; color: var(--tg-text-tertiary); display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .row a { color: var(--tg-accent-dark); text-decoration: none; }
  .row a:hover { text-decoration: underline; }
  .dot { width: 8px; height: 8px; border-radius: var(--radius-full); flex-shrink: 0; }
  .dot.green { background: var(--tg-success); } .dot.amber { background: var(--tg-warning); } .dot.gray { background: var(--tg-text-tertiary); } .dot.red { background: var(--tg-error); }
  .rel { font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums; padding: 2px 8px; border-radius: var(--radius-sm); background: var(--tg-bg-tertiary); }

  /* ---------- States ---------- */
  .state { text-align: center; padding: 64px 24px; color: var(--tg-text-tertiary); }
  .state svg { margin-bottom: 16px; opacity: .5; }
  .state h3 { font-size: 18px; font-weight: 600; color: var(--tg-text-secondary); margin-bottom: 8px; }
  .state p { font-size: 14px; max-width: 380px; margin: 0 auto; }
  .skeleton { background: var(--tg-bg-primary); border: 1px solid var(--tg-border); border-radius: var(--radius-xl); padding: 24px; }
  .shimmer { background: linear-gradient(90deg, var(--tg-bg-tertiary) 25%, var(--tg-border-light) 50%, var(--tg-bg-tertiary) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: var(--radius-sm); }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  .sk-line { height: 12px; margin-bottom: 10px; }
  .panel { display: none; } .panel.active { display: block; }
  .spin { animation: spin 1s linear infinite; } @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 640px) {
    .wrap { padding: 16px; }
    .topbar { padding: 12px 16px; }
    .grid { grid-template-columns: 1fr; }
    .brand-text h1 { font-size: 16px; }
  }
</style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand-logo" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#00B4D8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l6-7 4 4 7-10"/></svg>
      </div>
      <div class="brand-text">
        <h1>Luna Trends</h1>
        <p>Travel Intelligence</p>
      </div>
    </div>
    <div class="topbar-spacer"></div>
    <button class="icon-btn" id="refreshBtn" aria-label="Refresh data" title="Refresh">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
    </button>
    <button class="icon-btn" id="themeBtn" aria-label="Toggle dark mode" title="Toggle theme">
      <svg id="themeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </header>

  <main class="wrap">
    <div class="updated" id="updated" aria-live="polite"></div>

    <section class="stats" id="stats" aria-label="Summary statistics"></section>

    <div class="tabs" role="tablist">
      <button class="tab" role="tab" aria-selected="true" aria-controls="panel-trends" id="tab-trends" data-tab="trends">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l6-7 4 4 7-10"/><path d="M14 4h7v7"/></svg>
        Trends <span class="count" id="ct-trends">0</span>
      </button>
      <button class="tab" role="tab" aria-selected="false" aria-controls="panel-signals" id="tab-signals" data-tab="signals" tabindex="-1">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h4l3 8 4-16 3 8h4"/></svg>
        Signals <span class="count" id="ct-signals">0</span>
      </button>
      <button class="tab" role="tab" aria-selected="false" aria-controls="panel-sources" id="tab-sources" data-tab="sources" tabindex="-1">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14a9 3 0 0 0 18 0V5"/><path d="M3 12a9 3 0 0 0 18 0"/></svg>
        Sources <span class="count" id="ct-sources">0</span>
      </button>
    </div>

    <!-- TRENDS -->
    <section class="panel active" id="panel-trends" role="tabpanel" aria-labelledby="tab-trends">
      <div class="section-head">
        <h2>Synthesised Trends</h2>
        <div class="actions">
          <button class="btn btn-secondary" id="collectBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="m8 11 4 4 4-4"/><path d="M3 21h18"/></svg>
            Run Collection
          </button>
          <button class="btn btn-primary" id="synthBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4"/><path d="M12 18v4"/><path d="m4.93 4.93 2.83 2.83"/><path d="m16.24 16.24 2.83 2.83"/><path d="M2 12h4"/><path d="M18 12h4"/><path d="m4.93 19.07 2.83-2.83"/><path d="m16.24 7.76 2.83-2.83"/></svg>
            Run Synthesis
          </button>
        </div>
      </div>
      <div id="trends-body"></div>
    </section>

    <!-- SIGNALS -->
    <section class="panel" id="panel-signals" role="tabpanel" aria-labelledby="tab-signals">
      <div class="section-head"><h2>Recent Signals</h2></div>
      <div id="signals-body"></div>
    </section>

    <!-- SOURCES -->
    <section class="panel" id="panel-sources" role="tabpanel" aria-labelledby="tab-sources">
      <div class="section-head"><h2>Sources</h2></div>
      <div id="sources-body"></div>
    </section>
  </main>

<script>
(function () {
  "use strict";
  var DATA = null;

  // ---------- helpers ----------
  function esc(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  }
  function fmtDate(iso) {
    if (!iso) return "—";
    var d = new Date(iso);
    if (isNaN(d)) return "—";
    return d.toLocaleDateString("en-GB", { day: "numeric", month: "short" }) + " " +
           d.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" });
  }
  function arr(v) { return Array.isArray(v) ? v : (v ? [v] : []); }
  function $(id) { return document.getElementById(id); }

  // ---------- theme ----------
  function applyTheme(t) {
    document.documentElement.setAttribute("data-theme", t);
    var sun = '<circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>';
    var moon = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
    $("themeIcon").innerHTML = t === "dark" ? sun : moon;
    try { sessionStorage.setItem("lt-theme", t); } catch (e) {}
  }
  $("themeBtn").addEventListener("click", function () {
    applyTheme(document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark");
  });
  try { var saved = sessionStorage.getItem("lt-theme"); if (saved) applyTheme(saved); } catch (e) {}

  // ---------- tabs ----------
  var tabs = document.querySelectorAll(".tab");
  tabs.forEach(function (tab) {
    tab.addEventListener("click", function () { selectTab(tab.dataset.tab); });
  });
  function selectTab(name) {
    tabs.forEach(function (t) {
      var on = t.dataset.tab === name;
      t.setAttribute("aria-selected", on ? "true" : "false");
      t.tabIndex = on ? 0 : -1;
    });
    document.querySelectorAll(".panel").forEach(function (p) {
      p.classList.toggle("active", p.id === "panel-" + name);
    });
  }

  // ---------- skeleton ----------
  function skeletonGrid() {
    var s = "";
    for (var i = 0; i < 6; i++) {
      s += '<div class="skeleton"><div class="shimmer sk-line" style="width:60%;height:18px"></div>' +
           '<div class="shimmer sk-line"></div><div class="shimmer sk-line" style="width:90%"></div>' +
           '<div class="shimmer sk-line" style="width:40%"></div></div>';
    }
    return '<div class="grid">' + s + '</div>';
  }

  // ---------- render ----------
  function scoreClass(n) { return n >= 7 ? "high" : n >= 4 ? "mid" : "low"; }
  function dirClass(d) { return "dir-" + String(d || "").toLowerCase(); }

  function renderStats(c) {
    $("stats").innerHTML =
      stat("Active Trends", c.activeTrends, c.trends + " total", true) +
      stat("Signals", c.signals, c.unprocessedSignals + " unprocessed") +
      stat("Active Sources", c.activeSources, c.sources + " total") +
      stat("Last Sync", "", "");
    // counts on tabs
    $("ct-trends").textContent = c.trends;
    $("ct-signals").textContent = c.signals;
    $("ct-sources").textContent = c.sources;
  }
  function stat(label, value, sub, accent) {
    if (label === "Last Sync") {
      return '<div class="stat"><div class="label">Last Sync</div>' +
        '<div class="value" style="font-size:15px;font-weight:600;line-height:1.4">' +
        fmtDate(DATA && DATA.generatedAt) + '</div></div>';
    }
    return '<div class="stat' + (accent ? " accent" : "") + '">' +
      '<div class="label">' + esc(label) + '</div>' +
      '<div class="value">' + esc(value) + '</div>' +
      (sub ? '<div class="sub">' + esc(sub) + '</div>' : '') + '</div>';
  }

  function parseMA(raw) {
    if (!raw) return [];
    try { var p = JSON.parse(raw); return Array.isArray(p) ? p : []; }
    catch (e) { return []; }
  }

  function renderTrends(trends) {
    if (!trends.length) {
      $("trends-body").innerHTML = emptyState(
        "No trends yet",
        "Signals are gathering in the background. Run synthesis once the pool has built up, and trends will appear here ranked by opportunity."
      );
      return;
    }
    var html = '<div class="grid">';
    trends.forEach(function (t) {
      var ma = parseMA(t.marketingActions);
      var dests = arr(t.destinations);
      html += '<article class="card">' +
        '<div class="card-top"><h3>' + esc(t.name) + '</h3>' +
          (t.score != null ? '<div class="score ' + scoreClass(t.score) + '">' + esc(t.score) + '</div>' : '') +
        '</div>' +
        '<p class="desc">' + esc(t.description) + '</p>' +
        '<div class="chips">' +
          (t.direction ? '<span class="chip ' + dirClass(t.direction) + '">' + esc(t.direction) + '</span>' : '') +
          (t.type ? '<span class="chip type">' + esc(t.type) + '</span>' : '') +
          (t.signalCount != null ? '<span class="chip">' + esc(t.signalCount) + ' signal' + (t.signalCount === 1 ? '' : 's') + '</span>' : '') +
          dests.slice(0, 3).map(function (d) { return '<span class="chip">' + esc(d) + '</span>'; }).join('') +
        '</div>';
      if (ma.length) {
        html += '<div class="ma"><div class="ma-title">Suggested marketing actions</div>';
        ma.slice(0, 3).forEach(function (a) {
          html += '<div class="ma-item">' +
            (a.type ? '<div class="ma-type">' + esc(a.type) + '</div>' : '') +
            (a.headline ? '<div class="ma-headline">' + esc(a.headline) + '</div>' : '') +
            (a.brief ? '<div class="ma-brief">' + esc(a.brief) + '</div>' : '') +
          '</div>';
        });
        html += '</div>';
      }
      html += '</article>';
    });
    html += '</div>';
    $("trends-body").innerHTML = html;
  }

  function renderSignals(signals) {
    if (!signals.length) {
      $("signals-body").innerHTML = emptyState("No signals yet", "Run a collection to pull the latest from the active RSS sources.");
      return;
    }
    var html = '<div class="list">';
    signals.forEach(function (s) {
      html += '<div class="row">' +
        '<span class="dot ' + (s.processed ? "gray" : "green") + '" title="' + (s.processed ? "Processed" : "Unprocessed") + '"></span>' +
        '<div class="main"><div class="title">' + esc(s.title) + '</div>' +
        '<div class="meta">' +
          (s.signalType ? '<span>' + esc(s.signalType) + '</span>' : '') +
          (arr(s.destinations).length ? '<span>· ' + esc(arr(s.destinations).join(", ")) + '</span>' : '') +
          '<span>· ' + fmtDate(s.detectedAt) + '</span>' +
          (s.sourceUrl ? '<span>· <a href="' + esc(s.sourceUrl) + '" target="_blank" rel="noopener noreferrer">source</a></span>' : '') +
        '</div></div>' +
        (s.relevance != null ? '<span class="rel" title="Relevance">' + esc(s.relevance) + '</span>' : '') +
      '</div>';
    });
    html += '</div>';
    $("signals-body").innerHTML = html;
  }

  function renderSources(sources) {
    if (!sources.length) { $("sources-body").innerHTML = emptyState("No sources", "Add sources in Airtable to start collecting."); return; }
    var html = '<div class="list">';
    sources.forEach(function (s) {
      var statusDot = s.status === "Active" ? "green" : s.status === "Error" ? "red" : s.status === "Paused" ? "amber" : "gray";
      html += '<div class="row">' +
        '<span class="dot ' + statusDot + '" title="' + esc(s.status) + '"></span>' +
        '<div class="main"><div class="title">' + esc(s.name) + '</div>' +
        '<div class="meta">' +
          (s.category ? '<span>' + esc(s.category) + '</span>' : '') +
          (s.type ? '<span>· ' + esc(s.type) + '</span>' : '') +
          (s.checkFrequency ? '<span>· ' + esc(s.checkFrequency) + '</span>' : '') +
          '<span>· last checked ' + fmtDate(s.lastChecked) + '</span>' +
        '</div></div>' +
      '</div>';
    });
    html += '</div>';
    $("sources-body").innerHTML = html;
  }

  function emptyState(title, body) {
    return '<div class="state">' +
      '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l6-7 4 4 7-10"/><path d="M14 4h7v7"/></svg>' +
      '<h3>' + esc(title) + '</h3><p>' + esc(body) + '</p></div>';
  }
  function errorState(msg) {
    return '<div class="state">' +
      '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--tg-error)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>' +
      '<h3>Could not load data</h3><p>' + esc(msg) + '</p></div>';
  }

  // ---------- load ----------
  function load() {
    $("trends-body").innerHTML = skeletonGrid();
    $("updated").textContent = "Loading…";
    fetch("/api/dashboard-data", { headers: { "Accept": "application/json" } })
      .then(function (r) { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
      .then(function (d) {
        if (!d.ok) throw new Error(d.error || "Unknown error");
        DATA = d;
        renderStats(d.counts);
        renderTrends(d.trends);
        renderSignals(d.signals);
        renderSources(d.sources);
        $("updated").innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg> Updated ' + fmtDate(d.generatedAt);
      })
      .catch(function (e) {
        $("trends-body").innerHTML = errorState(e.message);
        $("updated").textContent = "";
      });
  }
  $("refreshBtn").addEventListener("click", load);

  // ---------- actions (collect / synthesise) ----------
  // The CRON_SECRET is never stored in this file. We prompt for it at runtime
  // and keep it only in sessionStorage for the session, so the buttons work
  // without ever shipping the secret in client code.
  function getSecret() {
    var s = "";
    try { s = sessionStorage.getItem("lt-secret") || ""; } catch (e) {}
    if (!s) {
      s = window.prompt("Enter the Luna Trends admin secret to run this action.\n(Stored only for this browser session.)") || "";
      if (s) { try { sessionStorage.setItem("lt-secret", s); } catch (e) {} }
    }
    return s;
  }
  function runAction(btn, path, label) {
    var secret = getSecret();
    if (!secret) return;
    var original = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<svg class="spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.22-8.56"/></svg> Running…';
    fetch(path + "?secret=" + encodeURIComponent(secret))
      .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, status: r.status, body: j }; }); })
      .then(function (res) {
        if (res.status === 401) {
          try { sessionStorage.removeItem("lt-secret"); } catch (e) {}
          alert("Admin secret rejected. Try again.");
          return;
        }
        if (!res.ok) throw new Error(res.body && res.body.error ? res.body.error : "HTTP " + res.status);
        var b = res.body || {};
        var msg = label + " complete.\n";
        if (b.signalsCreated != null) msg += "Signals created: " + b.signalsCreated + "\n";
        if (b.sourcesChecked != null) msg += "Sources checked: " + b.sourcesChecked + "\n";
        if (b.signalsProcessed != null) msg += "Signals processed: " + b.signalsProcessed + "\n";
        if (b.trendsCreated != null) msg += "Trends created: " + b.trendsCreated + "\n";
        alert(msg);
        load();
      })
      .catch(function (e) { alert(label + " failed: " + e.message); })
      .finally(function () { btn.disabled = false; btn.innerHTML = original; });
  }
  $("collectBtn").addEventListener("click", function () { runAction($("collectBtn"), "/api/collect", "Collection"); });
  $("synthBtn").addEventListener("click", function () { runAction($("synthBtn"), "/api/synthesise", "Synthesis"); });

  load();
})();
</script>
</body>
</html>
