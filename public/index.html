<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luna Trends — Travelgenix</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Inter, system-ui, -apple-system, sans-serif; background: #0F172A; color: #E2E8F0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: #1E293B; border: 1px solid #334155; border-radius: 16px; padding: 48px; max-width: 480px; text-align: center; }
  .logo { font-size: 14px; letter-spacing: 3px; color: #00B4B6; text-transform: uppercase; margin-bottom: 16px; }
  h1 { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
  .sub { color: #94A3B8; font-size: 16px; margin-bottom: 32px; }
  .status { display: inline-flex; align-items: center; gap: 8px; background: #0F172A; border: 1px solid #334155; border-radius: 8px; padding: 8px 16px; font-size: 14px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #10B981; animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .info { margin-top: 24px; font-size: 13px; color: #64748B; }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">Travelgenix</div>
    <h1>Luna Trends</h1>
    <p class="sub">Travel Intelligence Engine</p>
    <div class="status"><span class="dot"></span> Collection engine active</div>
    <p class="info">Dashboard coming soon. The intelligence engine is running in the background, collecting and analysing travel industry signals.</p>
  </div>
</body>
</html>
